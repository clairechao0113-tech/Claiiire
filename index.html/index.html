<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taipei Clock</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- 背景 -->

<div id="background"></div>



<!-- 時間卡 -->

<div id="clockCard">


    <div id="city">
        台北
    </div>


    <div id="time">
        00:00:00
    </div>


    <div id="date">
        2026年1月1日 星期四
    </div>


    <!-- 縮放控制 -->

    <div id="resizeHandle"></div>


</div>





<!-- 設定區 -->

<div id="controlPanel">


    <button id="settingsBtn">
        設定
    </button>



    <div id="settingsPanel">


        <button id="changeBackground">
            更換背景
        </button>





        <button id="fullscreen">
            全螢幕
        </button>



        <div class="sliderBox">

            <span>
                透明度
            </span>


            <input
            type="range"
            id="opacitySlider"
            min="0"
            max="0.3"
            step="0.01"
            value="0.12">

        </div>




        <div class="sliderBox">

            <span>
                模糊
            </span>


            <input
            type="range"
            id="blurSlider"
            min="0"
            max="60"
            step="1"
            value="35">

        </div>



    </div>


</div>





<!-- 圖片選擇 -->

<input
type="file"
id="imageInput"
accept="image/*">






<script src="script.js"></script>


</body>

</html>
